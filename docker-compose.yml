# Referenced: https://docs.docker.com/compose/gettingstarted/
# Based on: https://dev.to/caffinecoder54/docker-compose-for-development-setting-up-a-complete-lamp-stack-16h2

services:

  apache:
    build: ./apache
    restart: unless-stopped
    ports:
      #HOST_PORT : CONTAINER_PORT (maps container port 80 to .env specified port)
      - "${APP_PORT}:80"
    volumes:
      #maps the content of ./www in your host to the /var/www/html of the container
      - ./www:/var/www/html
    depends_on:
      - php
      - mariadb

  php:
    build: ./php
    restart: unless-stopped
    volumes:
      #maps the content of ./www in your host to the /var/www/html of the container
      - ./www:/var/www/html

  mariadb:
    #check the mariadb version you need for your project
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    #don't need to map db ports to the host except for testing
    # ports:
    #   - "3306:3306"
    volumes:
      #maps the content of mariadb_data volume to the /var/lib/mysql of the container
      - mariadb_data:/var/lib/mysql
      #maps ./mariadb to location that will run all .sql files inside to initialize the database
      - ./mariadb:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin:5.2
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      #maps your pc port to the container port
      - "${PHPMA_PORT}:80"
    depends_on:
      - mariadb

volumes:
  mariadb_data:

